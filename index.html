<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automated Sign Language Generator Evaluation</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #3f4652;
      --panel: #fff3bf;
      --panel-deep: #ffe174;
      --purple: #bf5cff;
      --blue: #0f61b9;
      --white: #ffffff;
      --border: #d6b849;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(20, 20, 20, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 20, 20, 0.04) 1px, transparent 1px),
        #ffffff;
      background-size: 16px 16px;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .welcome-panel {
      width: min(1160px, 100%);
      min-height: 560px;
      padding: 58px 32px 68px;
      border: 1px solid var(--border);
      border-radius: 72px;
      background: linear-gradient(160deg, var(--panel), var(--panel-deep));
      box-shadow: 0 20px 60px rgba(42, 84, 140, 0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(34px, 5.4vw, 66px);
      line-height: 1.08;
      letter-spacing: 0;
      color: var(--purple);
      text-transform: uppercase;
    }

    .subtitle {
      margin: 28px 0 42px;
      text-align: center;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 26px);
      font-weight: 800;
    }

    .menu {
      width: min(430px, 100%);
      display: grid;
      gap: 26px;
      margin-top: 8px;
    }

    .menu a {
      display: grid;
      place-items: center;
      min-height: 62px;
      border: 2px solid #111111;
      background: var(--white);
      color: #000000;
      font-size: clamp(22px, 2.3vw, 30px);
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .menu a:hover,
    .menu a:focus {
      outline: 3px solid rgba(15, 97, 185, 0.22);
      background: #edf6ff;
      color: var(--blue);
      transform: translateY(-1px);
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.12);
    }

    .footer-note {
      margin: auto 0 0;
      padding-top: 36px;
      text-align: center;
      color: #5f6673;
      font-size: 15px;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .welcome-panel {
        min-height: auto;
        padding: 38px 18px 42px;
        border-radius: 34px;
      }

      .menu {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="welcome-panel">
    <h1>Welcome to User-Study Evaluation</h1>
    <p class="subtitle">Automated Sign Language Generator Evaluation, Monash University</p>

    <nav class="menu" aria-label="Study sections">
      <a href="project-description.html">Project Description</a>
      <a href="screening-language.html">Screening</a>
      <a href="#">Tutorial</a>
      <a href="#">Evaluation</a>
    </nav>

    <p class="footer-note">Project ID 52521</p>
  </main>
</body>
</html>
