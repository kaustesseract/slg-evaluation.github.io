<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Automated Sign Language Generator</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f7;
}

.container{

    max-width:900px;
    margin:50px auto;
    background:white;
    padding:50px;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,.12);
    position:relative;

}

.container::before{

    content:"";
    position:absolute;
    inset:0;
    background:url("Arms_of_Monash_University.svg") center center no-repeat;
    background-size:400px;
    opacity:.09;
    pointer-events:none;

}

.content{

    position:relative;
    z-index:1;

}

h1{

    text-align:center;
    color:#003366;

}

.subtitle{

    text-align:center;
    color:#666;
    line-height:1.7;
    margin-top:20px;
    margin-bottom:45px;

}

.menu-grid{

    display:grid;
    gap:20px;

}

.menu-card{

    display:block;
    text-decoration:none;
    text-align:center;

    padding:22px;

    background:#0055cc;

    color:white;

    border-radius:10px;

    font-size:22px;

    transition:.2s;

}

.menu-card:hover{

    background:#003d99;

}

</style>

</head>

<body>

<div class="container">

<div class="content">

<h1>Automated Sign Language Generator</h1>

<p class="subtitle">

Welcome to the Automated Sign Language Generator Evaluation Study.

Please begin by completing the eligibility survey or read the project description before participating.

</p>

<div class="menu-grid">

<a class="menu-card" href="survey.html">

Eligibility Survey

</a>

<a class="menu-card" href="project-description.html">

Project Description

</a>

</div>

</div>

</div>

<script>

if(!sessionStorage.getItem("participant_id")){

    sessionStorage.setItem(
        "participant_id",
        crypto.randomUUID()
    );

}

</script>

</body>

</html>
