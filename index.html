<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automated Sign Language Generator Evaluation</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #3f4652;
      --purple: #ff4cff;
      --blue: #0055cc;
      --blue-dark: #003d99;
      --white: #ffffff;
      --line: #d9dee7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #eef2f7;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .home-panel {
      width: min(980px, 100%);
      min-height: 580px;
      padding: 54px 34px 58px;
      border-radius: 18px;
      background: var(--white);
      box-shadow: 0 8px 25px rgba(0,0,0,.12);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .home-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("Arms_of_Monash_University.svg") center center no-repeat;
      background-size: 500px;
      opacity: 0.07;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0;
      max-width: 900px;
      color: var(--purple);
      font-size: clamp(32px, 4.8vw, 54px);
      line-height: 1.08;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 26px 0 56px;
      color: var(--muted);
      font-size: clamp(18px, 2.1vw, 25px);
      font-weight: 900;
      line-height: 1.35;
    }

    .menu {
      width: min(560px, 100%);
      display: grid;
      gap: 26px;
    }

    .menu a {
      display: grid;
      place-items: center;
      min-height: 66px;
      border-radius: 10px;
      background: var(--blue);
      color: var(--white);
      font-size: clamp(22px, 2.5vw, 30px);
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .menu a:hover,
    .menu a:focus {
      outline: 3px solid rgba(15, 97, 185, 0.22);
      background: var(--blue-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.12);
    }

    .project-id {
      margin: 34px 0 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .home-panel {
        min-height: auto;
        padding: 44px 18px 46px;
      }

      .home-panel::before {
        background-size: 360px;
      }

      .subtitle {
        margin-bottom: 38px;
      }

      .menu {
        gap: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="home-panel">
    <div class="content">
      <h1>Welcome to User-Study Evaluation</h1>
      <p class="subtitle">Automated Sign Language Generator Evaluation, Monash University</p>

      <nav class="menu" aria-label="Main website menu">
        <a href="survey.html">Eligibility Survey</a>
        <a href="project-description.html">Project Description</a>
      </nav>

      <p class="project-id">Project ID 52521</p>
    </div>
  </main>

  <script>
    function createParticipantId() {
      const existingId = sessionStorage.getItem("participant_id");
      if (existingId) {
        return existingId;
      }

      const newId = crypto.randomUUID
        ? crypto.randomUUID()
        : `participant-${Date.now()}-${Math.random().toString(16).slice(2)}`;

      sessionStorage.setItem("participant_id", newId);
      return newId;
    }

    createParticipantId();
  </script>
</body>
</html>
