<!-- ================= SURVEY ================= -->

<div id="survey">

  <div id="page1">

    <h2>Before we begin...</h2>

    <p class="subtitle">
      Please answer a few questions about yourself.
    </p>

    <!-- Question 1 -->

    <div class="question">

      <label>1. Age</label>

      <select id="age">

        <option value="">Select</option>

        <option>18–24</option>
        <option>25–34</option>
        <option>35–44</option>
        <option>45–54</option>
        <option>55+</option>

      </select>

    </div>

    <!-- Question 2 -->

    <div class="question">

      <label>2. Gender</label>

      <select id="gender">

        <option value="">Select</option>

        <option>Male</option>
        <option>Female</option>
        <option>Non-binary</option>
        <option>Prefer not to disclose</option>

      </select>

    </div>

    <!-- Question 3 -->

    <div class="question">

      <label>3. Highest Education</label>

      <select id="education">

        <option value="">Select</option>

        <option>High School</option>
        <option>Bachelor's</option>
        <option>Master's</option>
        <option>Doctorate</option>

      </select>

    </div>

    <button onclick="showSurvey2()">

      Continue →

    </button>

  </div>

  <!-- ================= PAGE 2 ================= -->

  <div id="page2" style="display:none;">

    <h2>Language Background</h2>

    <div class="question">

      <label>4. Years using sign language</label>

      <select id="years">

        <option value="">Select</option>

        <option>&lt;1 year</option>
        <option>1–3 years</option>
        <option>4–7 years</option>
        <option>&gt;7 years</option>

      </select>

    </div>

    <div class="question">

      <label>5. Frequency of use</label>

      <select id="frequency">

        <option value="">Select</option>

        <option>Daily</option>
        <option>Weekly</option>
        <option>Monthly</option>
        <option>Occasionally</option>

      </select>

    </div>

    <div class="question">

      <label>6. Proficiency</label>

      <select id="proficiency">

        <option value="">Select</option>

        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Advanced</option>
        <option>Native / Fluent</option>

      </select>

    </div>

    <button onclick="finishSurvey()">

      Start Study →

    </button>

  </div>

</div>
