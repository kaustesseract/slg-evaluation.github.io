<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Sign Language</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #3f4652;
      --panel: #fff3bf;
      --panel-deep: #ffe174;
      --purple: #ff4cff;
      --blue: #0f61b9;
      --white: #ffffff;
      --border: #d6b849;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(20, 20, 20, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 20, 20, 0.04) 1px, transparent 1px),
        #ffffff;
      background-size: 16px 16px;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .screening-panel {
      width: min(900px, 100%);
      min-height: 500px;
      padding: 42px 32px 52px;
      border: 1px solid var(--border);
      border-radius: 72px;
      background: linear-gradient(160deg, var(--panel), var(--panel-deep));
      box-shadow: 0 20px 60px rgba(42, 84, 140, 0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h1 {
      margin: 0 0 34px;
      font-size: clamp(32px, 4.2vw, 48px);
      line-height: 1.1;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .question {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 0 34px;
      padding: 16px 28px;
      border: 2px solid rgba(191, 92, 255, 0.45);
      border-radius: 18px;
      background: linear-gradient(135deg, #ffffff 0%, #f5e8ff 45%, #eaf4ff 100%);
      color: #8b16d8;
      font-size: clamp(22px, 2.5vw, 30px);
      font-weight: 900;
      line-height: 1.25;
      box-shadow: 0 12px 30px rgba(111, 63, 160, 0.18);
      text-shadow: 0 1px 0 #ffffff;
    }

    .language-menu {
      width: min(520px, 100%);
      display: grid;
      gap: 22px;
    }

    .language-menu a,
    .back-link {
      display: grid;
      place-items: center;
      min-height: 58px;
      border: 2px solid #111111;
      background: var(--white);
      color: #000000;
      font-size: clamp(20px, 2.2vw, 26px);
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .language-menu a:hover,
    .language-menu a:focus,
    .back-link:hover,
    .back-link:focus {
      outline: 3px solid rgba(15, 97, 185, 0.22);
      background: #edf6ff;
      color: var(--blue);
      transform: translateY(-1px);
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.12);
    }

    .back-link {
      width: min(220px, 100%);
      min-height: 46px;
      margin-top: 34px;
      font-size: 18px;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .screening-panel {
        min-height: auto;
        padding: 34px 18px 38px;
        border-radius: 34px;
      }

      .language-menu {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="screening-panel">
    <h1>Screening</h1>
    <p class="question">Which language do you want to select?</p>

    <nav class="language-menu" aria-label="Select sign language">
      <a href="#">American Sign Language</a>
      <a href="#">German Sign Language</a>
      <a href="#">Chinese Sign Language</a>
    </nav>

    <a class="back-link" href="index.html">Back to Home</a>
  </main>
</body>
</html>
